<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - 3D Model Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="navbar-logo">ModelShop</a>
      <ul class="navbar-nav">
        <li><a href="index.html">Back to Store</a></li>
      </ul>
    </div>
  </nav>

  <section class="checkout-container">
    <h1>Complete your purchase</h1>
    <div id="checkoutContent">
      <div class="checkout-form">
        <h2>Buyer details</h2>
        <div class="form-group">
          <label for="buyerName">Your name</label>
          <input id="buyerName" type="text">
        </div>
        <div class="form-group">
          <label for="buyerEmail">Your email</label>
          <input id="buyerEmail" type="email">
        </div>
        <button class="btn-primary" id="confirmPurchase" type="button">Confirm Purchase</button>
      </div>
      <div class="order-summary">
        <h2>Order summary</h2>
        <div id="summaryContent">Loading...</div>
      </div>
    </div>
    <div id="successMessage" class="payment-success"></div>
  </section>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="main.js"></script>
  <script>
    async function renderCheckout() {
      const params = new URLSearchParams(window.location.search);
      const productId = params.get("productId");
      const product = await getProductById(productId);
      const summary = document.getElementById("summaryContent");

      if (!product) {
        summary.innerHTML = '<p>Product not found.</p>';
        return;
      }

      summary.innerHTML = `
        <div class="summary-item"><span>${escapeHtml(product.name)}</span><span>$${Number(product.price || 0).toFixed(2)}</span></div>
        <div class="summary-total">Total: $${Number(product.price || 0).toFixed(2)}</div>
      `;
    }

    document.getElementById("confirmPurchase").addEventListener("click", async () => {
      const params = new URLSearchParams(window.location.search);
      const productId = params.get("productId");
      const buyerName = document.getElementById("buyerName").value.trim();
      const buyerEmail = document.getElementById("buyerEmail").value.trim();

      if (!buyerName || !buyerEmail) {
        alert("Please enter your name and email.");
        return;
      }

      await addOrder(productId, buyerName, buyerEmail);
      document.getElementById("checkoutContent").style.display = "none";
      document.getElementById("successMessage").classList.add("show");
      document.getElementById("successMessage").innerHTML = `<h2>Purchase confirmed</h2><p>Your order was saved to Firestore. A download link will be available after payment processing.</p>`;
    });

    document.addEventListener("DOMContentLoaded", async () => {
      await initializeStorage();
      await renderCheckout();
    });
  </script>
</body>
</html>
