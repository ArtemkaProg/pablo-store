<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metal kettle - 3D Model Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- NAVIGATION -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="navbar-logo">
        <span></span> ModelShop
      </a>
      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <ul class="navbar-nav" id="navMenu">
        <li><a href="index.html">Catalog</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- PRODUCT DETAIL -->
  <section class="product-detail">
    <div class="product-detail-container">
      <!-- GALLERY -->
      <div class="product-gallery">
        <div class="gallery-main">
          <img id="mainImage" src="images/kettle.jpg" alt="Product" onerror="this.src='images/kettle.jpg'">
        </div>
        <div class="gallery-thumbnails" id="thumbnails">
          <!-- Thumbnails will be generated by JavaScript -->
        </div>
      </div>

      <!-- PRODUCT INFO -->
      <div class="product-details">
        <h1 id="productName"></h1>
        <p class="price" id="productPrice"></p>
        
        <div class="product-description">
          <p id="productFullDescription"></p>
        </div>

        <div class="action-buttons">
          <button class="btn-primary" onclick="goToCheckout()">Buy Now</button>
          <button class="btn-secondary" onclick="toggleInquiryForm()">Ask a Question</button>
        </div>

        <!-- INQUIRY FORM (Hidden by default) -->
        <div class="inquiry-form hidden" id="inquiryFormContainer">
          <h3>Ask the Creator</h3>
          <div class="form-group">
            <label for="inquiryName">Your Name</label>
            <input type="text" id="inquiryName" placeholder="John Doe">
          </div>
          <div class="form-group">
            <label for="inquiryEmail">Your Email</label>
            <input type="email" id="inquiryEmail" placeholder="john@example.com">
          </div>
          <div class="form-group">
            <label for="inquiryMessage">Message</label>
            <textarea id="inquiryMessage" placeholder="What would you like to know about this model?"></textarea>
          </div>
          <button class="btn-primary btn-full-width" onclick="submitInquiry()">Send Message</button>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer style="background-color: var(--bg-secondary); border-top: 1px solid var(--border-color); padding: 2rem; text-align: center; color: var(--text-secondary);">
    <div class="container">
      <p>&copy; 2024 3D Model Store. All rights reserved.</p>
    </div>
  </footer>

  <script src="main.js"></script>
  <script>
    /**
     * PRODUCT PAGE LOGIC
     * This template works for any product ID
     */

    // Get product ID from URL (product-1.html → 1)
    const productId = window.location.pathname.split("-")[1].split(".")[0];
    let currentProduct = null;

    // Setup hamburger menu
    const hamburger = document.getElementById("hamburger");
    const navMenu = document.getElementById("navMenu");

    if (hamburger) {
      hamburger.addEventListener("click", () => {
        navMenu.classList.toggle("show");
      });

      navMenu.querySelectorAll("a").forEach(link => {
        link.addEventListener("click", () => {
          navMenu.classList.remove("show");
        });
      });
    }

    // Load product details
    function loadProductDetails() {
      currentProduct = getProductById(productId);

      if (!currentProduct) {
        document.body.innerHTML = "<div style='text-align: center; padding: 5rem; color: #e0e0ff;'><h1>Product not found</h1><p><a href='index.html'>Back to Catalog</a></p></div>";
        return;
      }

      // Set product info
      document.getElementById("productName").textContent = currentProduct.name;
      document.getElementById("productPrice").textContent = `$${currentProduct.price.toFixed(2)}`;
      document.getElementById("productFullDescription").textContent = currentProduct.fullDescription;

      // Setup gallery
      const thumbnailsContainer = document.getElementById("thumbnails");
      thumbnailsContainer.innerHTML = currentProduct.imagePaths.map((img, idx) => 
        `<div class="gallery-thumbnail ${idx === 0 ? 'active' : ''}" onclick="changeMainImage('${img}', this)">
          <img src="${img}" alt="Image ${idx + 1}" onerror="this.src='images/placeholder.jpg'">
        </div>`
      ).join("");
    }

    // Change main image
    function changeMainImage(imagePath, thumbnail) {
      document.getElementById("mainImage").src = imagePath;
      document.querySelectorAll(".gallery-thumbnail").forEach(t => t.classList.remove("active"));
      thumbnail.classList.add("active");
    }

    // Toggle inquiry form
    function toggleInquiryForm() {
      const form = document.getElementById("inquiryFormContainer");
      form.classList.toggle("hidden");
    }

    // Submit inquiry
    function submitInquiry() {
      const name = document.getElementById("inquiryName").value.trim();
      const email = document.getElementById("inquiryEmail").value.trim();
      const message = document.getElementById("inquiryMessage").value.trim();

      if (!name || !email || !message) {
        alert("Please fill in all fields");
        return;
      }

      addInquiry(productId, name, email, message);
      alert("Thank you! Your message has been sent.");
      document.getElementById("inquiryName").value = "";
      document.getElementById("inquiryEmail").value = "";
      document.getElementById("inquiryMessage").value = "";
      toggleInquiryForm();
    }

    // Navigate to checkout
    function goToCheckout() {
      window.location.href = `checkout.html?productId=${productId}`;
    }

    // Initialize
    document.addEventListener("DOMContentLoaded", () => {
      loadProductDetails();
    });
  </script>
</body>
</html>
