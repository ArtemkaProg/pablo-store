<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Model Store - Premium Digital Models</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="navbar-logo">ModelShop</a>
      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <ul class="navbar-nav" id="navMenu">
        <li><a href="index.html" class="active">Catalog</a></li>
        <li><a href="#contact">Contact</a></li>
        <li><a href="admin.html">Admin</a></li>
      </ul>
    </div>
  </nav>

  <section class="hero">
    <div class="container">
      <h1>3D Models for Creators</h1>
      <p>High-quality digital assets for games, visualization, and animation projects</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <h2>Our Collections</h2>
      <div class="product-grid" id="productGrid">
        <p class="text-muted">Loading products...</p>
      </div>
    </div>
  </section>

  <section class="section section-light" id="contact">
    <div class="container">
      <h2>Get in Touch</h2>
      <p>Have questions? Want to collaborate? Reach out to us!</p>
      <p><strong>Email:</strong> contact@modelshop.com</p>
    </div>
  </section>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="main.js"></script>
  <script>
    const hamburger = document.getElementById("hamburger");
    const navMenu = document.getElementById("navMenu");

    if (hamburger) {
      hamburger.addEventListener("click", () => {
        navMenu.classList.toggle("show");
      });

      navMenu.querySelectorAll("a").forEach((link) => {
        link.addEventListener("click", () => {
          navMenu.classList.remove("show");
        });
      });
    }

    async function loadProductsCatalog() {
      const grid = document.getElementById("productGrid");
      const products = await getProducts();

      if (!products.length) {
        grid.innerHTML = '<div class="empty-state">No products yet. Add your first model from the admin panel.</div>';
        return;
      }

      grid.innerHTML = products.map((product) => createProductCard(product)).join("");
    }

    document.addEventListener("DOMContentLoaded", async () => {
      await initializeStorage();
      await loadProductsCatalog();
    });
  </script>
</body>
</html>
