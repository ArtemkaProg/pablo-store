<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - 3D Model Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="navbar-logo">ModelShop</a>
      <ul class="navbar-nav">
        <li><a href="index.html">Back to Store</a></li>
      </ul>
    </div>
  </nav>

  <section class="admin-container">
    <h1>Admin Dashboard</h1>
    <p class="text-muted mb-3">Manage products, orders, and inquiries. Everything is stored in Firestore.</p>

    <div class="admin-stats">
      <div class="stat-card">
        <div class="stat-number" id="totalOrders">0</div>
        <div class="stat-label">Total Orders</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="totalInquiries">0</div>
        <div class="stat-label">Total Inquiries</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="totalProducts">0</div>
        <div class="stat-label">Products</div>
      </div>
    </div>

    <div class="admin-grid">
      <section class="admin-card">
        <h2>Add or Edit Product</h2>
        <form id="productForm" onsubmit="handleProductSubmit(event)">
          <input type="hidden" id="productId" value="">
          <div class="form-group">
            <label for="productName">Product name</label>
            <input id="productName" type="text" required>
          </div>
          <div class="form-group">
            <label for="price">Price</label>
            <input id="price" type="number" min="0" step="0.01" required>
          </div>
          <div class="form-group">
            <label for="shortDescription">Short description</label>
            <input id="shortDescription" type="text" required>
          </div>
          <div class="form-group">
            <label for="fullDescription">Full description</label>
            <textarea id="fullDescription" required></textarea>
          </div>
          <div class="form-group">
            <label for="thumbnailImage">Thumbnail image</label>
            <input id="thumbnailImage" type="file" accept="image/*">
          </div>
          <div class="form-group">
            <label for="galleryImages">Gallery images</label>
            <input id="galleryImages" type="file" accept="image/*" multiple>
          </div>
          <div class="form-group">
            <label for="downloadFileName">Download file name</label>
            <input id="downloadFileName" type="text" placeholder="model.zip">
          </div>
          <div class="form-actions">
            <button class="btn-primary" type="submit">Save Product</button>
            <button class="btn-secondary" type="button" onclick="resetProductForm()">Reset</button>
          </div>
        </form>
      </section>

      <section class="admin-card">
        <h2>Current Products</h2>
        <div id="productList"></div>
      </section>
    </div>

    <div class="admin-section">
      <h2>Orders</h2>
      <div id="ordersContainer"></div>
    </div>

    <div class="admin-section">
      <h2>Inquiries</h2>
      <div id="inquiriesContainer"></div>
    </div>
  </section>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="main.js"></script>
  <script>
    let editingProductId = null;

    async function loadAdminDashboard() {
      const products = await getProducts();
      const orders = await getOrders();
      const inquiries = await getInquiries();

      document.getElementById("totalOrders").textContent = orders.length;
      document.getElementById("totalInquiries").textContent = inquiries.length;
      document.getElementById("totalProducts").textContent = products.length;
      renderProductList(products);
      renderOrders(orders, products);
      renderInquiries(inquiries, products);
    }

    function renderProductList(products) {
      const container = document.getElementById("productList");
      if (!products.length) {
        container.innerHTML = '<div class="empty-state">No products yet.</div>';
        return;
      }

      container.innerHTML = products.map((product) => `
        <div class="product-admin-card">
          <div>
            <h3>${escapeHtml(product.name)}</h3>
            <p>${escapeHtml(product.shortDescription || "")}</p>
            <p class="text-muted">$${Number(product.price || 0).toFixed(2)}</p>
          </div>
          <div class="product-admin-actions">
            <button class="btn-secondary" type="button" onclick="editProduct(${product.id})">Edit</button>
            <button class="btn-secondary" type="button" onclick="deleteProduct(${product.id})">Delete</button>
          </div>
        </div>
      `).join("");
    }

    function renderOrders(orders, products) {
      const container = document.getElementById("ordersContainer");
      if (!orders.length) {
        container.innerHTML = '<div class="empty-state">No orders yet.</div>';
        return;
      }

      container.innerHTML = orders.map((order) => {
        const product = products.find((item) => Number(item.id) === Number(order.productId));
        return `
          <div class="inquiry-card">
            <p><strong>${escapeHtml(order.buyerName)}</strong> — ${escapeHtml(order.buyerEmail)}</p>
            <p>Product: ${escapeHtml(product ? product.name : "Unknown")}</p>
            <p class="text-muted">${formatDate(order.timestamp)}</p>
          </div>
        `;
      }).join("");
    }

    function renderInquiries(inquiries, products) {
      const container = document.getElementById("inquiriesContainer");
      if (!inquiries.length) {
        container.innerHTML = '<div class="empty-state">No inquiries yet.</div>';
        return;
      }

      container.innerHTML = inquiries.map((inquiry) => {
        const product = products.find((item) => Number(item.id) === Number(inquiry.productId));
        return `
          <div class="inquiry-card">
            <p><strong>${escapeHtml(inquiry.buyerName)}</strong> — ${escapeHtml(inquiry.buyerEmail)}</p>
            <p>${escapeHtml(inquiry.message)}</p>
            <p>Product: ${escapeHtml(product ? product.name : "Unknown")}</p>
            <p class="text-muted">${formatDate(inquiry.timestamp)}</p>
          </div>
        `;
      }).join("");
    }

    async function editProduct(id) {
      const product = await getProductById(id);
      if (!product) {
        return;
      }
      editingProductId = product.id;
      document.getElementById("productId").value = product.id;
      document.getElementById("productName").value = product.name || "";
      document.getElementById("price").value = product.price || 0;
      document.getElementById("shortDescription").value = product.shortDescription || "";
      document.getElementById("fullDescription").value = product.fullDescription || "";
      document.getElementById("downloadFileName").value = product.downloadFilePath ? product.downloadFilePath.replace("downloads/", "") : "";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function handleProductSubmit(event) {
      event.preventDefault();
      const productIdValue = document.getElementById("productId").value;
      const name = document.getElementById("productName").value.trim();
      const price = parseFloat(document.getElementById("price").value);
      const shortDescription = document.getElementById("shortDescription").value.trim();
      const fullDescription = document.getElementById("fullDescription").value.trim();
      const downloadFileName = document.getElementById("downloadFileName").value.trim();
      const thumbnailFile = document.getElementById("thumbnailImage").files[0];
      const galleryFiles = document.getElementById("galleryImages").files;

      if (!name || !shortDescription || !fullDescription || Number.isNaN(price)) {
        alert("Please fill in the required fields.");
        return;
      }

      const existingProduct = productIdValue ? await getProductById(productIdValue) : null;
      const thumbnailPath = thumbnailFile ? await readFileAsDataURL(thumbnailFile) : (existingProduct ? existingProduct.thumbnailPath : "");
      const imagePaths = galleryFiles && galleryFiles.length ? await readMultipleFilesAsDataURLs(galleryFiles) : (existingProduct ? existingProduct.imagePaths || [] : []);
      const productPayload = {
        id: existingProduct ? existingProduct.id : await createProductId(),
        name,
        shortDescription,
        fullDescription,
        price,
        thumbnailPath,
        imagePaths,
        downloadFilePath: normalizeDownloadPath(downloadFileName)
      };

      await initializeFirebase();
      const docId = String(productPayload.id);
      await db.collection("products").doc(docId).set({
        ...productPayload,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });

      resetProductForm();
      await loadAdminDashboard();
      alert(existingProduct ? "Product updated." : "Product added.");
    }

    async function deleteProduct(id) {
      if (!confirm("Delete this product from the store?")) {
        return;
      }
      await deleteProductById(id);
      if (editingProductId === id) {
        resetProductForm();
      }
      await loadAdminDashboard();
    }

    function resetProductForm() {
      editingProductId = null;
      document.getElementById("productForm").reset();
      document.getElementById("productId").value = "";
    }

    document.addEventListener("DOMContentLoaded", async () => {
      await initializeStorage();
      await loadAdminDashboard();
    });
  </script>
</body>
</html>
